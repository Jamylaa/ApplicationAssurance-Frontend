<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Vermeg</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link id="primeng-theme" rel="stylesheet" href="assets/primeng-themes/lara-light-blue/theme.css">
  <script>
    (() => {
      const stored = localStorage.getItem('theme');
      const preferred =
        stored ||
        (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');

      document.documentElement.dataset.theme = preferred;
      document.documentElement.setAttribute('data-bs-theme', preferred);
      document.documentElement.style.setProperty('--bs-primary', preferred === 'dark' ? '#60a5fa' : '#3b82f6');
      document.documentElement.style.setProperty('--bs-primary-rgb', preferred === 'dark' ? '96, 165, 250' : '59, 130, 246');

      const themeLink = document.getElementById('primeng-theme');
      if (themeLink) {
        themeLink.setAttribute(
          'href',
          preferred === 'dark'
            ? 'assets/primeng-themes/lara-dark-blue/theme.css'
            : 'assets/primeng-themes/lara-light-blue/theme.css'
        );
      }
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
