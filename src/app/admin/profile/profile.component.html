<div class="container-fluid py-4">
  <div class="card border-0 shadow-sm rounded-3">
    <div class="card-body">
      <h4 class="card-title mb-3">Mon profil</h4>
      <div class="row">
        <div class="col-md-6">
          <dl class="row">
            <dt class="col-sm-4 text-muted">Nom</dt>
            <dd class="col-sm-8">{{ user?.userName || '—' }}</dd>
            <dt class="col-sm-4 text-muted">Email</dt>
            <dd class="col-sm-8">{{ user?.email || '—' }}</dd>
            <dt class="col-sm-4 text-muted">Rôle</dt>
            <dd class="col-sm-8">{{ role || '—' }}</dd>
          </dl>
        </div>
      </div>
      <div class="mt-4">
        <button pButton class="p-button-danger" (click)="logout()">Se déconnecter</button>
      </div>
    </div>
  </div>
</div>
