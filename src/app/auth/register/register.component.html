<div class="login-container flex align-items-center justify-content-center min-vh-100">
    <div class="login-card p-5 shadow-4 border-round-xl surface-card" style="width: 100%; max-width: 450px;">
        <div class="login-header text-center mb-5">
            <h2 class="text-900 font-bold mb-2">Inscription Administrateur</h2>
            <p class="text-600">Créez votre compte administrateur AssurAI</p>
        </div>
        
        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="flex flex-column gap-3">
            <div class="field flex flex-column gap-2 mb-3">
                <label for="userName" class="block text-900 font-medium">Nom d'utilisateur</label>
                <div class="p-input-icon-left">
                    <i class="pi pi-user"></i>
                    <input pInputText id="userName" formControlName="userName" placeholder="Ex: jean-dupont" class="w-full" />
                </div>
                <small class="p-error" *ngIf="registerForm.get('userName')?.invalid && registerForm.get('userName')?.dirty">
                    Lettres, chiffres et traits d'union (-) uniquement.
                </small>
            </div>
            <div class="field flex flex-column gap-2 mb-3">
                <label for="email" class="block text-900 font-medium">Email</label>
                <div class="p-input-icon-left">
                    <i class="pi pi-envelope"></i>
                    <input pInputText type="email" id="email" formControlName="email" placeholder="votre@email.com" class="w-full" />
                </div>
            </div>
            <div class="field flex flex-column gap-2 mb-3">
                <label for="phone" class="block text-900 font-medium">Téléphone</label>
                <div class="p-input-icon-left">
                    <i class="pi pi-phone"></i>
                    <input pInputText type="number" id="phone" formControlName="phone" placeholder="Numéro de téléphone" class="w-full" />
                </div>
            </div>
            <div class="field flex flex-column gap-2 mb-4">
                <label for="password" class="block text-900 font-medium">Mot de passe</label>
                <p-password id="password" formControlName="password" [toggleMask]="true" [feedback]="true" 
                            promptLabel="Choisissez un mot de passe" weakLabel="Faible" mediumLabel="Moyen" strongLabel="Fort"
                            styleClass="w-full" inputStyleClass="w-full" placeholder="••••••••"></p-password>
                <small class="p-error" *ngIf="registerForm.get('password')?.hasError('minlength')">
                    Le mot de passe doit contenir au moins 7 caractères.
                </small>
            </div>
            <div class="error-msg mb-3" *ngIf="error">
                <p-message severity="error" [text]="error" styleClass="w-full"></p-message>
            </div>
            <button pButton type="submit" label="S'inscrire" icon="pi pi-user-plus" [disabled]="registerForm.invalid" class="w-full p-3 font-bold"></button>
        </form>
        <p-divider align="center" styleClass="my-4">
            <span class="text-600 font-medium">OU</span>
        </p-divider>

        <div class="login-footer text-center">
            <p class="text-600">Déjà un compte ? <a routerLink="/auth/login" class="text-primary font-bold no-underline hover:underline">Se connecter</a></p>
        </div>
    </div>
</div>
